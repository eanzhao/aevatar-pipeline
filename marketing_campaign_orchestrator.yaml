name: marketing_campaign_orchestrator
description: Link-grounded marketing discovery workflow that exports one final evidence summary document.

roles:
  - id: request_parser
    name: Request Parser
    system_prompt: |
      You parse a free-form marketing request into concise planning notes.
      Extract brand clues, URLs, goals, channels, asset types, and any brand manual content.
      Keep the result structured and short.
      Match the user's language unless a step explicitly requires a token, slug, or URL.
      Do not use emoji.

  - id: source_resolver
    name: Source Resolver
    system_prompt: |
      You resolve brand source URLs from parsed request context.
      If an explicit official website URL is present, return it.
      If no URL can be inferred, return only NONE.

  - id: discovery_analyst
    name: Discovery Analyst
    system_prompt: |
      You synthesize brand and content evidence into a discovery report.
      Ignore navigation chrome, cookie banners, and repeated boilerplate.
      Focus on positioning, audience, proof, offer, product usage patterns, competitors, content patterns, and gaps.
      Match the user's language.
      Do not use emoji.

  - id: marketing_strategist
    name: Marketing Strategist
    system_prompt: |
      You turn discovery findings into a concise, evidence-grounded market opportunity analysis.
      Preserve brand-specific facts, claims, offers, product mechanics, and source confidence.
      Prefer direct observations and explicit gaps over generic recommendations.
      Match the user's language.
      Do not use emoji.

  - id: delivery_operator
    name: Delivery Operator
    system_prompt: |
      You produce one final evidence-grounded markdown summary from the researched links.
      Keep the document factual, compact, and easy to review.
      Match the user's language unless a proper noun, UI label, or platform name should remain English.
      Do not use emoji.

  - id: content_exporter
    name: Content Exporter
    system_prompt: |
      You export approved markdown artifacts through approved connectors only.
      Return file-save details only.
    connectors:
      - marketing_markdown_export

  - id: web_researcher
    name: Web Researcher
    system_prompt: |
      You gather website evidence through approved connectors only.
      Treat connector output as the source of truth.
    connectors:
      - marketing_search_mcp
      - marketing_extract_mcp

steps:
  - id: capture_raw_input
    type: assign
    parameters:
      target: "raw_request"
      value: "$input"

  - id: infer_output_language
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Determine the preferred output language for the final report from the following request.
        Rules:
        - If the user explicitly asks for English or says the output should be in English, return only `en`.
        - If the user explicitly asks for Chinese or says the output should be in Chinese, return only `zh`.
        - Otherwise, follow the dominant language of the request.
        - Return only one token: `zh` or `en`.

        Request:
        ${variables.raw_request}

  - id: save_output_language
    type: assign
    parameters:
      target: "output_language"
      value: "$input"

  - id: restore_raw_request_for_parse
    type: assign
    parameters:
      target: "raw_request_for_parse"
      value: "${variables.raw_request}"

  - id: parse_request
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Parse the following free-form request into concise structured planning notes.
        Use exactly these headings:

        # Parsed Request
        - Brand:
        - Brand URL:
        - Brand manual:
        - Campaign goal:
        - Channels:
        - Asset types:
        - Competitor hints:
        - Notes:

  - id: save_request_brief
    type: assign
    parameters:
      target: "request_brief"
      value: "$input"

  - id: resolve_brand_url
    type: llm_call
    role: source_resolver
    parameters:
      prompt_prefix: |
        Resolve the official brand website URL from the following parsed request.
        If an official URL is present or strongly implied, return only the canonical URL.
        If no URL can be inferred, return only NONE.
        
        Discovery context:
        ${variables.request_brief}

  - id: save_brand_url
    type: assign
    parameters:
      target: "brand_url"
      value: "$input"

  - id: route_brand_source
    type: conditional
    parameters:
      condition: "${eq(variables.brand_url, 'NONE')}"
    branches:
      true: build_brand_lookup_query
      false: extract_homepage

  - id: build_brand_lookup_query
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Build a short search-engine query to find the official website for this brand.
        Keep it under 12 words.
        Discovery context:
        ${variables.request_brief}
        Return only the query text.

  - id: save_brand_lookup_query
    type: assign
    parameters:
      target: "brand_lookup_query"
      value: "$input"

  - id: discover_brand_url
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_search_mcp
      method: POST
      operation: /search
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "query": "${json(variables.brand_lookup_query)}",
          "search_depth": "basic",
          "topic": "general",
          "max_results": 5,
          "include_answer": false,
          "include_raw_content": false
        }
      timeout_ms: "20000"

  - id: infer_brand_url_from_search
    type: llm_call
    role: source_resolver
    parameters:
      prompt_prefix: |
        Infer the single best official brand website URL from these search results.
        Return only one canonical URL, or NONE if unclear.

  - id: save_discovered_brand_url
    type: assign
    parameters:
      target: "brand_url"
      value: "$input"

  - id: route_discovered_brand_source
    type: conditional
    parameters:
      condition: "${eq(variables.brand_url, 'NONE')}"
    branches:
      true: collect_manual_brand_profile
      false: extract_homepage

  - id: collect_manual_brand_profile
    type: human_input
    parameters:
      prompt: |
        I could not confidently resolve an official brand website from the current request and search results.
        Please provide a short fallback brand profile so discovery can continue.

        Use this structure:
        - Brand name:
        - Product type:
        - Tone of voice:
        - Value proposition:
        - Target audience:
        - Visual identity:
        - Official URL (if you know it):
        - Extra notes:
      variable: "manual_brand_profile"
      timeout: "3600"
      on_timeout: "fail"

  - id: build_manual_research_bundle
    type: assign
    parameters:
      target: "research_bundle"
      value: |
        Request:
        ${variables.request_brief}

        Official URL:
        ${variables.brand_url}

        Manual fallback brand profile:
        ${variables.manual_brand_profile}

        Homepage:
        Manual fallback was used because no official URL could be resolved from the current request and search results.

        Pricing:
        Pricing page unavailable because no official URL could be resolved.

        Customers:
        Customer proof page unavailable because no official URL could be resolved.

        Features:
        Features page unavailable because no official URL could be resolved.
    next: normalize_research_bundle

  - id: extract_homepage
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_extract_mcp
      method: POST
      operation: /api/url/extract
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "url": "${json(variables.brand_url)}",
          "selectors": {
            "title": "title",
            "headline": "h1",
            "hero_copy": "main h1, main h2, section:first-of-type p",
            "section_headings": "main h2, main h3",
            "hero_cta": "main a[href*='pricing'], main a[href*='signup'], main a[href*='trial'], main button",
            "nav_links": "header a, nav a",
            "main_paragraphs": "main p",
            "feature_points": "main li",
            "faq_questions": "details summary, .faq h3, [data-faq] h3"
          },
          "options": {
            "returnText": true,
            "returnHtml": false,
            "maxItemsPerSelector": 8
          }
        }
      timeout_ms: "20000"

  - id: save_homepage
    type: assign
    parameters:
      target: "homepage_data"
      value: "$input"

  - id: build_pricing_page_query
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Build a short search-engine query to find the official pricing, plans, or pricing-related page for this brand.
        Keep it under 12 words.
        Discovery context:
        ${variables.request_brief}

        Official URL:
        ${variables.brand_url}

        Homepage evidence:
        ${variables.homepage_data}
        Return only the query text.

  - id: save_pricing_page_query
    type: assign
    parameters:
      target: "pricing_page_query"
      value: "$input"

  - id: search_pricing_page
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_search_mcp
      method: POST
      operation: /search
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "query": "${json(variables.pricing_page_query)}",
          "search_depth": "basic",
          "topic": "general",
          "max_results": 6,
          "include_answer": false,
          "include_raw_content": false
        }
      timeout_ms: "20000"

  - id: infer_pricing_page_url
    type: llm_call
    role: source_resolver
    parameters:
      prompt_prefix: |
        Infer the single best official pricing or plans page URL from these search results.
        Prefer pages on the official domain.
        Prefer canonical pricing or plans pages whose path clearly contains words such as `pricing`, `prices`, `plans`, or `plan`.
        Do not choose trial, signup, demo, login, onboarding, or generic try pages if a clearer pricing/plans page exists on the official domain.
        If both a trial page and a pricing/plans page are present on the official domain, choose the pricing/plans page.
        Return only one canonical URL, or NONE if unclear.

  - id: save_pricing_page_url
    type: assign
    parameters:
      target: "pricing_page_url"
      value: "$input"

  - id: route_pricing_page_source
    type: conditional
    parameters:
      condition: "${eq(variables.pricing_page_url, 'NONE')}"
    branches:
      true: mark_pricing_unavailable
      false: extract_pricing

  - id: mark_pricing_unavailable
    type: assign
    parameters:
      target: "pricing_data"
      value: |
        Pricing page unavailable.
        Search query: ${variables.pricing_page_query}
        Resolved URL: ${variables.pricing_page_url}
    next: build_customer_page_query

  - id: extract_pricing
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_extract_mcp
      method: POST
      operation: /api/url/extract
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "url": "${json(variables.pricing_page_url)}",
          "selectors": {
            "title": "title",
            "headline": "h1",
            "pricing_headings": "main h1, main h2, main h3",
            "pricing_paragraphs": "main p",
            "pricing_cta": "main a[href*='signup'], main a[href*='trial'], main a[href*='pricing'], main button",
            "pricing_points": "main li"
          },
          "options": {
            "returnText": true,
            "returnHtml": false,
            "maxItemsPerSelector": 8
          }
        }
      timeout_ms: "20000"

  - id: save_pricing
    type: assign
    parameters:
      target: "pricing_data"
      value: "$input"
    next: build_customer_page_query

  - id: build_customer_page_query
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Build a short search-engine query to find the official customer stories, testimonials, reviews, or case studies page for this brand.
        Keep it under 12 words.
        Discovery context:
        ${variables.request_brief}

        Official URL:
        ${variables.brand_url}

        Homepage evidence:
        ${variables.homepage_data}
        Return only the query text.

  - id: save_customer_page_query
    type: assign
    parameters:
      target: "customer_page_query"
      value: "$input"

  - id: search_customer_page
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_search_mcp
      method: POST
      operation: /search
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "query": "${json(variables.customer_page_query)}",
          "search_depth": "basic",
          "topic": "general",
          "max_results": 6,
          "include_answer": false,
          "include_raw_content": false
        }
      timeout_ms: "20000"

  - id: infer_customer_page_url
    type: llm_call
    role: source_resolver
    parameters:
      prompt_prefix: |
        Infer the single best official customer proof page URL from these search results.
        Prefer pages on the official domain.
        Return only one canonical URL, or NONE if unclear.

  - id: save_customer_page_url
    type: assign
    parameters:
      target: "customer_page_url"
      value: "$input"

  - id: route_customer_page_source
    type: conditional
    parameters:
      condition: "${eq(variables.customer_page_url, 'NONE')}"
    branches:
      true: mark_customers_unavailable
      false: extract_customers

  - id: mark_customers_unavailable
    type: assign
    parameters:
      target: "customers_data"
      value: |
        Customer proof page unavailable.
        Search query: ${variables.customer_page_query}
        Resolved URL: ${variables.customer_page_url}
    next: build_feature_page_query

  - id: extract_customers
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_extract_mcp
      method: POST
      operation: /api/url/extract
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "url": "${json(variables.customer_page_url)}",
          "selectors": {
            "title": "title",
            "headline": "h1",
            "customer_headings": "main h1, main h2, main h3",
            "customer_quotes": "blockquote, main q",
            "customer_paragraphs": "main p",
            "customer_cta": "main a[href*='pricing'], main a[href*='signup'], main a[href*='trial'], main button"
          },
          "options": {
            "returnText": true,
            "returnHtml": false,
            "maxItemsPerSelector": 8
          }
        }
      timeout_ms: "20000"

  - id: save_customers
    type: assign
    parameters:
      target: "customers_data"
      value: "$input"
    next: build_feature_page_query

  - id: build_feature_page_query
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Build a short search-engine query to find the official features, product tour, or product capabilities page for this brand.
        Keep it under 12 words.
        Discovery context:
        ${variables.request_brief}

        Official URL:
        ${variables.brand_url}

        Homepage evidence:
        ${variables.homepage_data}
        Return only the query text.

  - id: save_feature_page_query
    type: assign
    parameters:
      target: "feature_page_query"
      value: "$input"

  - id: search_feature_page
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_search_mcp
      method: POST
      operation: /search
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "query": "${json(variables.feature_page_query)}",
          "search_depth": "basic",
          "topic": "general",
          "max_results": 6,
          "include_answer": false,
          "include_raw_content": false
        }
      timeout_ms: "20000"

  - id: infer_feature_page_url
    type: llm_call
    role: source_resolver
    parameters:
      prompt_prefix: |
        Infer the single best official product features page URL from these search results.
        Prefer pages on the official domain.
        Return only one canonical URL, or NONE if unclear.

  - id: save_feature_page_url
    type: assign
    parameters:
      target: "feature_page_url"
      value: "$input"

  - id: route_feature_page_source
    type: conditional
    parameters:
      condition: "${eq(variables.feature_page_url, 'NONE')}"
    branches:
      true: mark_features_unavailable
      false: extract_features

  - id: mark_features_unavailable
    type: assign
    parameters:
      target: "features_data"
      value: |
        Features page unavailable.
        Search query: ${variables.feature_page_query}
        Resolved URL: ${variables.feature_page_url}
    next: build_research_bundle

  - id: extract_features
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_extract_mcp
      method: POST
      operation: /api/url/extract
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "url": "${json(variables.feature_page_url)}",
          "selectors": {
            "title": "title",
            "headline": "h1",
            "feature_headings": "main h1, main h2, main h3",
            "feature_paragraphs": "main p",
            "feature_points": "main li",
            "feature_cta": "main a, main button"
          },
          "options": {
            "returnText": true,
            "returnHtml": false,
            "maxItemsPerSelector": 8
          }
        }
      timeout_ms: "20000"

  - id: save_features
    type: assign
    parameters:
      target: "features_data"
      value: "$input"
    next: build_research_bundle

  - id: build_research_bundle
    type: assign
    parameters:
      target: "research_bundle"
      value: |
        Request:
        ${variables.request_brief}

        Official URL:
        ${variables.brand_url}

        Pricing page URL:
        ${variables.pricing_page_url}

        Homepage:
        ${variables.homepage_data}

        Pricing:
        ${variables.pricing_data}

        Customer proof page URL:
        ${variables.customer_page_url}

        Customers:
        ${variables.customers_data}

        Feature page URL:
        ${variables.feature_page_url}

        Features:
        ${variables.features_data}

    next: normalize_research_bundle

  - id: normalize_research_bundle
    type: llm_call
    role: discovery_analyst
    parameters:
      prompt_prefix: |
        Normalize the following research bundle into a concise marketing evidence pack.
        Keep only the facts most useful for downstream reasoning and generation.
        Keep it under 450 words.
        Use short bullet lists only.
        No long paragraphs and no duplicated evidence.
        Match the user's language.
        Do not use emoji.
        Ignore long CTA lists, repeated testimonials, repeated nav links, and decorative slogans.
        Prefer direct evidence over paraphrase.

        Include only:
        - official URL
        - homepage positioning
        - audience hints
        - pricing signals
        - customer proof signals
        - feature signals
        - key risks or gaps

        Use exactly these sections:

        # Research Evidence Pack
        ## Brand
        ## Audience Signals
        ## Pricing Signals
        ## Proof Signals
        ## Feature Signals
        ## Risks / Gaps

  - id: save_research_bundle_normalized
    type: assign
    parameters:
      target: "research_bundle_normalized"
      value: "$input"

  - id: build_competitor_search_query
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Build a short search-engine query to identify 3 to 8 direct competitors for this brand.
        Keep it under 14 words.
        Prefer product category, audience, and positioning clues.
        Return only the query text.

        Parsed request:
        ${variables.request_brief}

        Brand evidence:
        ${variables.research_bundle_normalized}

  - id: save_competitor_search_query
    type: assign
    parameters:
      target: "competitor_search_query"
      value: "$input"

  - id: search_competitors
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_search_mcp
      method: POST
      operation: /search
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "query": "${json(variables.competitor_search_query)}",
          "search_depth": "advanced",
          "topic": "general",
          "max_results": 8,
          "include_answer": false,
          "include_raw_content": false
        }
      timeout_ms: "45000"

  - id: save_competitor_search_results
    type: assign
    parameters:
      target: "competitor_search_results"
      value: "$input"

  - id: build_competitor_shortlist
    type: llm_call
    role: discovery_analyst
    parameters:
      prompt_prefix: |
        Build a stable shortlist of direct competitors from the current brand evidence and search results.
        Prefer 5 to 6 names.
        Prefer mainstream direct competitors that recur across multiple current sources and overlap on project management, collaboration, client work, or pricing logic.
        Exclude weak or edge-case alternatives when stronger recurring competitors are present.
        Return only this format:

        # Competitor Shortlist
        - Name
        - Name
        - Name

        Brand evidence:
        ${variables.research_bundle_normalized}

        Competitor search results:
        ${variables.competitor_search_results}

  - id: save_competitor_shortlist
    type: assign
    parameters:
      target: "competitor_shortlist"
      value: "$input"

  - id: build_competitor_social_query
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Build a short search-engine query to find public social/platform presence for the direct competitors.
        Keep it under 16 words.
        Prefer platform names such as LinkedIn, Instagram, TikTok, YouTube, X, or Threads when useful.
        Use the stable shortlist below rather than introducing new competitor names.
        Prefer official profile-style results over news articles, roundup posts, or comparison pages.
        Return only the query text.

        Brand evidence:
        ${variables.research_bundle_normalized}

        Stable competitor shortlist:
        ${variables.competitor_shortlist}

        Competitor search results:
        ${variables.competitor_search_results}

  - id: save_competitor_social_query
    type: assign
    parameters:
      target: "competitor_social_query"
      value: "$input"

  - id: search_competitor_social_signals
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_search_mcp
      method: POST
      operation: /search
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "query": "${json(variables.competitor_social_query)}",
          "search_depth": "advanced",
          "topic": "general",
          "max_results": 8,
          "include_answer": false,
          "include_raw_content": false
        }
      timeout_ms: "45000"

  - id: save_competitor_social_signals
    type: assign
    parameters:
      target: "competitor_social_signals"
      value: "$input"

  - id: build_competitor_social_profiles_query
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Build a short search-engine query to find official competitor social profile pages.
        Keep it under 18 words.
        Prefer platform names such as LinkedIn, Instagram, TikTok, YouTube, X, or Threads.
        Prefer official profile pages, company pages, channels, or handles over generic articles.
        Use the stable shortlist below rather than introducing new competitor names.
        Prefer query wording that surfaces URL patterns like `linkedin.com/company`, `youtube.com/@`, `instagram.com/`, `tiktok.com/@`, or `x.com/`.
        Avoid wording that is likely to surface thought-leadership posts, personal posts, or generic comparison articles.
        Return only the query text.

        Brand evidence:
        ${variables.research_bundle_normalized}

        Stable competitor shortlist:
        ${variables.competitor_shortlist}

        Competitor search results:
        ${variables.competitor_search_results}

  - id: save_competitor_social_profiles_query
    type: assign
    parameters:
      target: "competitor_social_profiles_query"
      value: "$input"

  - id: search_competitor_social_profiles
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_search_mcp
      method: POST
      operation: /search
      content_type: application/json
      stdin_mode: template
      payload_template: |
        {
          "query": "${json(variables.competitor_social_profiles_query)}",
          "search_depth": "advanced",
          "topic": "general",
          "max_results": 8,
          "include_answer": false,
          "include_raw_content": false
        }
      timeout_ms: "45000"

  - id: save_competitor_social_profiles
    type: assign
    parameters:
      target: "competitor_social_profiles"
      value: "$input"

  - id: build_competitor_recent_activity_query
    type: llm_call
    role: request_parser
    parameters:
      prompt_prefix: |
        Build a short search-engine query to find recent public social activity or recent post examples for the direct competitors.
        Keep it under 18 words.
        Prefer queries likely to surface recent posts, channels, reels, shorts, company page updates, or creator/account activity.
        Use the stable shortlist below rather than introducing new competitor names.
        Prefer official company-page posts, channel uploads, or official account activity over third-party commentary.
        Return only the query text.

        Stable competitor shortlist:
        ${variables.competitor_shortlist}

        Competitor search results:
        ${variables.competitor_search_results}

        Competitor social/profile signals:
        ${variables.competitor_social_profiles}

  - id: save_competitor_recent_activity_query
    type: assign
    parameters:
      target: "competitor_recent_activity_query"
      value: "$input"

  - id: search_competitor_recent_activity
    type: connector_call
    role: web_researcher
    parameters:
      connector: marketing_search_mcp
