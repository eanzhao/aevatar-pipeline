  - id: competitor_landscape_report
    type: llm_call
    role: discovery_analyst
    parameters:
      prompt_prefix: |
        Build a direct-competitor landscape from the brand evidence and public search results below.
        Only include competitors that are plausibly direct based on product category, audience, or positioning overlap.
        Prefer competitors that recur across multiple current sources, appear in official compare/alternative pages, or clearly overlap with Basecamp on small-team project management and client collaboration.
        Use the stable shortlist as the default candidate pool for the final set unless the broader current source set clearly disproves it.
        The final competitor set should normally be a subset of the stable shortlist; only replace a shortlist entry if a stronger direct competitor is supported by at least three current-source signals.
        A competitor should normally appear in at least two current sources, or in one official compare/alternative page plus one additional current source, before it is treated as stable enough for the final set.
        Prefer mainstream direct competitors over weak or edge-case alternatives when the evidence set supports stronger recurring options.
        If a weak candidate appears only once while a stronger direct alternative appears repeatedly, drop the weak candidate.
        Keep the final set stable and practical rather than exhaustive. Prefer 5 to 6 competitors unless the current source set clearly supports fewer or more.
        Keep it under 500 words.
        Use short bullets only.
        No tables.
        Preferred output language token: ${variables.output_language}
        If the token is `zh`, write in Chinese.
        If the token is `en`, write in English.
        Do not use emoji.
        If engagement rate, posting frequency, or platform presence is not clearly supported by the current source set, write `Unavailable from current source set`.
        Do not invent percentages.
        Prefer product pages, official pages, official profile pages, and clearly attributable public pages over generic listicles.
        Keep direct observations and lightweight inference separate inside each bullet.
        If the benchmark set includes public industry-level numbers, keep them in `Engagement Benchmark Notes` and label them clearly as public or industry benchmarks rather than competitor-specific metrics.
        If social profiles or recent activity results clearly identify official platform pages or recent posts, prefer those signals over generic roundup articles when writing platform presence or posting-frequency clauses.
        Treat only official profile pages, official channels, official handles, or clearly attributable platform URLs as confirmed platform presence. Ecosystem mentions, blog embeds, or generic references do not count as confirmed platform presence.

        Brand evidence:
        ${variables.research_bundle_normalized}

        Stable competitor shortlist:
        ${variables.competitor_shortlist}

        Competitor search results:
        ${variables.competitor_search_results}

        Competitor social/platform signals:
        ${variables.competitor_social_signals}

        Competitor social profiles:
        ${variables.competitor_social_profiles}

        Competitor content examples:
        ${variables.competitor_content_examples}

        Competitor native social examples:
        ${variables.competitor_native_social_examples}

        Competitor recent activity:
        ${variables.competitor_recent_activity}

        Public benchmark signals:
        ${variables.engagement_benchmark_results}

        Use exactly these sections:

        # Competitor Landscape
        ## Direct Competitors
        ## Engagement Benchmark Notes

        Formatting rules:
        - Direct Competitors: 3 to 8 bullets
        - Each competitor bullet must include:
          - competitor name
          - why it is direct
          - platform presence
          - content strategy signal
          - engagement percentage or `Unavailable from current source set`
          - posting frequency or `Unavailable from current source set`
          - one short evidence anchor from the current source set
        - If `en`, each competitor bullet should follow an English shape such as:
          - `<Name>: Direct overlap...; Platform presence: ...; Content strategy signal: ...; Engagement data: ...; Posting frequency: ...; Evidence anchor: ...`
        - If `zh`, each competitor bullet should follow a Chinese shape such as:
          - `<Name>：直接重叠于...；平台存在：...；内容策略信号...；互动率数据...；发帖频率数据...；证据锚点...`
        - If you can confirm official platform accounts, channels, or company pages, state the platform names plainly and do not append `Unavailable from current source set` to the same clause
        - If official platform pages are not clearly confirmed, write `Platform presence: Unclear from current source set`
        - Only use a posting-frequency description such as recent, regular, intermittent, or weekly when the current source set contains explicit dated recent activity or repeated recent-activity signals; otherwise write `Unavailable from current source set`
        - If `en`, use `Engagement data: Unavailable from current source set` only for the engagement metric field
        - If `zh`, use `互动率数据：Unavailable from current source set` only for the engagement metric field
        - If `en`, use `Posting frequency: Unavailable from current source set` only for the posting-frequency field
        - If `zh`, use `发帖频率数据：Unavailable from current source set` only for the posting-frequency field
        - Engagement Benchmark Notes: 3 to 5 bullets
        - Engagement Benchmark Notes should prefer concrete public benchmark numbers when present in the benchmark set
        - If `en`, each benchmark bullet should explicitly say it is a `Public industry benchmark` or `Public platform benchmark`
        - If `zh`, each benchmark bullet should explicitly say it is a `公开行业基准` or `公开平台基准`

  - id: save_competitor_landscape_report
    type: assign
    parameters:
      target: "competitor_landscape_report_text"
      value: "$input"

  - id: viral_pattern_report
    type: llm_call
    role: discovery_analyst
    parameters:
      prompt_prefix: |
        Identify effective content patterns from the competitor landscape and public search evidence.
        Keep it under 420 words.
        Use short bullets only.
        No tables.
        Preferred output language token: ${variables.output_language}
        If the token is `zh`, write in Chinese.
        If the token is `en`, write in English.
        Do not use emoji.
        If posting time, hashtag strategy, or engagement trigger is unclear from the current source set, write `Unclear from current source set`.
        Do not invent exact timing, hashtags, or platform metrics.
        Only include a pattern if the current source set provides at least one concrete public signal for it.
        Separate `observed pattern` from `why it may work` and from `how to reproduce it`.
        Prefer actual content-format observations first, especially official platform pages, native posts, reels, shorts, carousel-style posts, social documents, or recent activity evidence before falling back to comparison posts, category roundups, proof-led testimonials, list posts, or audience-specific explainer content.
        Do not pretend there is strong short-form social evidence if the source set mainly contains public web pages or roundup articles.
        If a bullet is based on comparison-page or roundup-page evidence rather than direct social-post evidence, say so explicitly.

        Brand evidence:
        ${variables.research_bundle_normalized}

        Stable competitor shortlist:
        ${variables.competitor_shortlist}

        Competitor landscape:
        ${variables.competitor_landscape_report_text}

        Raw competitor search results:
        ${variables.competitor_search_results}

        Competitor social/platform signals:
        ${variables.competitor_social_signals}

        Competitor social profiles:
        ${variables.competitor_social_profiles}

        Competitor content examples:
        ${variables.competitor_content_examples}

        Competitor native social examples:
        ${variables.competitor_native_social_examples}

        Competitor recent activity:
        ${variables.competitor_recent_activity}

        Public engagement benchmark signals:
        ${variables.engagement_benchmark_results}

        Use exactly these sections:

        # Viral Pattern Report
        ## Effective Patterns

        Formatting rules:
        - Effective Patterns: exactly 4 to 6 bullets
        - Each bullet must include:
          - content format
          - evidence type (`Social/content-format observation` or `Comparison/roundup observation` for `en`; `社媒/内容格式观察` or `比较/榜单内容观察` for `zh`)
          - hook structure
          - posting time signal
          - hashtag strategy signal
          - engagement trigger
          - why it may work
          - how the user could reproduce it
          - one short evidence anchor
        - If `en`, each bullet should read like:
          - `Observation type: ...; Observation: ...; Timing signal: ...; Hashtag signal: ...; Trigger: ...; Why it may work: ...; How to reproduce: ...; Evidence anchor: ...`
        - If `zh`, each bullet should read like:
          - `观察类型：...；观察：...；时间信号：...；标签信号：...；触发点：...；为何可能有效：...；复现方式：...；证据锚点：...`

  - id: save_viral_pattern_report
    type: assign
    parameters:
      target: "viral_pattern_report_text"
      value: "$input"

  - id: discovery_report
    type: llm_call
    role: discovery_analyst
    parameters:
      prompt_prefix: |
        Produce a concise discovery report from the following research evidence pack.
        Research evidence pack:
        ${variables.research_bundle_normalized}

        Competitor landscape:
        ${variables.competitor_landscape_report_text}

        Viral patterns:
        ${variables.viral_pattern_report_text}

        Competitor content examples:
        ${variables.competitor_content_examples}

        Competitor social profiles:
        ${variables.competitor_social_profiles}

        Competitor native social examples:
        ${variables.competitor_native_social_examples}

        Competitor recent activity:
        ${variables.competitor_recent_activity}

        Public benchmark signals:
        ${variables.engagement_benchmark_results}

        Keep it under 520 words.
        Use short bullet lists only.
        No long paragraphs.
        Preferred output language token: ${variables.output_language}
        If the token is `zh`, write in Chinese.
        If the token is `en`, write in English.
        Do not use emoji.
        Keep this step as a factual bridge, not a polished final report.
        Prefer direct evidence and explicit unknowns over strategic phrasing.
        If the benchmark set contains public industry numbers, carry them forward instead of collapsing them into `Unavailable from current source set`.
        In `Viral Content Patterns`, preserve whether a pattern came from direct social/content evidence or from comparison/roundup content evidence.
        Use exactly these sections:

        # Discovery Report
        ## Brand Profile
        ## Competitor Segmentation
        ## Viral Content Patterns
        ## Market Gaps

  - id: save_discovery_report
