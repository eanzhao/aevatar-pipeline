  - id: strategy_report
    type: llm_call
    role: marketing_strategist
    parameters:
      prompt_prefix: |
        Generate a concise market opportunity analysis from the discovery context.
        Discovery context:
        ${variables.discovery_report_text}

        Brand evidence:
        ${variables.research_bundle_normalized}

        Stable competitor shortlist:
        ${variables.competitor_shortlist}

        Competitor landscape:
        ${variables.competitor_landscape_report_text}

        Viral patterns:
        ${variables.viral_pattern_report_text}

        Competitor content examples:
        ${variables.competitor_content_examples}

        Competitor social profiles:
        ${variables.competitor_social_profiles}

        Competitor native social examples:
        ${variables.competitor_native_social_examples}

        Competitor recent activity:
        ${variables.competitor_recent_activity}

        Public benchmark signals:
        ${variables.engagement_benchmark_results}

        Keep it under 420 words.
        Use short bullet lists only.
        No tables.
        No long paragraphs.
        Preferred output language token: ${variables.output_language}
        If the token is `zh`, write in Chinese.
        If the token is `en`, write in English.
        Do not use emoji.
        Avoid generic marketing phrases and generic content advice.
        Favor explicit opportunity tags, positioning whitespace, and benchmark clarity.
        If a benchmark is not supported by the current source set, write `Unavailable from current source set`.
        Treat this as a discovery-stage synthesis, not a campaign plan.
        Use `current evidence suggests` when making an inference instead of sounding absolute.
        If public benchmark signals contain numeric industry averages or format benchmarks, keep the numeric benchmark and label it as a public industry benchmark.

        Use exactly these sections:

        # Opportunity Report
        ## Market Position Map
        ## Content Opportunity Tags
        ## Engagement Benchmarks
        ## Recommended Content Mix
        ## Notes / Assumptions

  - id: save_strategy_report
    type: assign
    parameters:
      target: "strategy_report_text"
      value: "$input"

  - id: delivery_bundle
    type: llm_call
    role: delivery_operator
    parameters:
      prompt_prefix: |
        Produce one final markdown brand discovery report from the provided links and extracted evidence.
        Base the document only on the researched pages and the summarized evidence below.

        Research evidence:
        ${variables.research_bundle_normalized}

        Stable competitor shortlist:
        ${variables.competitor_shortlist}

        Discovery summary:
        ${variables.discovery_report_text}

        Opportunity summary:
        ${variables.strategy_report_text}

        Competitor landscape:
        ${variables.competitor_landscape_report_text}

        Viral patterns:
        ${variables.viral_pattern_report_text}

        This is a discovery report, not an asset pack.
        Do not generate scripts, hook libraries, platform plans, publish orders, folder structures, export notes, or generic marketing advice.
        Keep the document under 1200 words.
        Use short bullets only.
        No tables.
        No long paragraphs.
        Preferred output language token: ${variables.output_language}
        If the token is `zh`, write the final report in natural Chinese.
        If the token is `en`, write the final report in natural English.
        In either case, proper nouns, UI labels, and platform names may remain in their original form where appropriate.
        Do not use emoji.
        If evidence is missing, say it is unclear instead of guessing.
        Keep every bullet traceable to the source pages.
        Prefer concrete nouns, product mechanics, offer details, and page language from the actual source set.
        Avoid abstract phrasing such as `strongest fit`, `clear quadrant`, `best positioned`, or `high-conviction` unless the evidence directly supports it.
        For inferred points:
        - if `zh`, write `当前证据表明...`
        - if `en`, write `Current evidence suggests...`
        Language discipline:
        - If `zh`, use Chinese business wording for generic terms such as audience labels, positioning labels, content pattern names, and benchmark explanations.
        - If `en`, do not switch back into Chinese for section titles, bullets, or benchmark labels.
        - If `en`, write benchmark labels in English, for example `Public platform benchmark`, `Public industry benchmark`, `Unavailable from current source set`, and `Unclear from current source set`.
        - If `zh`, write benchmark labels in Chinese, for example `公开平台基准`, `公开行业基准`, `Unavailable from current source set`, and `Unclear from current source set` only when the English phrase is required by the rule.
        Keep the output useful as a summary of the provided links, not as a consultant-style narrative.

        Use exactly one matching section set:
        - If `zh`:
          # Brand Discovery Report
          ## 品牌简介
          ## 竞争对手细分
          ## 市场位置图
          ## 病毒内容模式
          ## 市场缺口分析
          ## 内容机会标签
          ## 参与度基准
          ## 推荐内容组合
        - If `en`:
          # Brand Discovery Report
          ## Brand Profile
          ## Competitor Segmentation
          ## Market Position Map
          ## Viral Content Patterns
          ## Market Gap Analysis
          ## Content Opportunity Tags
          ## Engagement Benchmarks
          ## Recommended Content Mix

        Formatting rules:
        - Brand Profile / 品牌简介: exactly 6 bullets covering brand name, product type, brand tone, value proposition, target audience, and visual identity
        - If `zh`, generic audience labels should be translated into Chinese business wording; if `en`, keep them in natural English
        - In the visual-identity bullet, if evidence is limited, do not stop at `unclear`; add one concrete UI or page-presentation signal from the current source set
        - Competitor Segmentation / 竞争对手细分: 3 to 8 bullets; each bullet must include competitor name, direct-overlap reason, platform presence, content strategy signal, engagement percentage or `Unavailable from current source set`, posting frequency or `Unavailable from current source set`, and one short evidence anchor
        - Treat the stable competitor shortlist as the default final set unless the broader current evidence clearly contradicts one entry
        - The final competitor set should normally be a subset of the stable competitor shortlist; only replace a shortlist entry if a stronger direct competitor is supported by at least three current-source signals
        - Prioritize competitors that recur across multiple current sources and overlap clearly with Basecamp on small-team project management, client collaboration, or pricing logic
        - Prefer stable mainstream direct competitors over edge-case alternatives when stronger recurring competitors are present in the current source set
        - Treat platform presence as confirmed only when the current source set includes official profile pages, official channels, official handles, or clearly attributable platform URLs
        - If official platform presence is not confirmed, say it is unclear rather than inferring from ecosystem mentions or generic roundup references
        - Write platform presence and missing metrics as separate clauses
        - If `en`, use an English shape such as `Platform presence: ...; Engagement data: ...; Posting frequency: ...; Evidence anchor: ...`
        - If `zh`, use a Chinese shape such as `平台存在：...；互动率数据：...；发帖频率数据：...；证据锚点：...`
        - Market Position Map / 市场位置图: exactly 4 bullets describing positioning axes and where the brand sits versus competitors; each bullet must include one evidence anchor from the source pages or benchmark set
        - Viral Content Patterns / 病毒内容模式: exactly 4 to 6 bullets; each bullet must include format, observation type, hook/opening structure, timing signal, hashtag signal, engagement trigger, why it may work, how to reproduce it, and one short evidence anchor
        - Market Gap Analysis / 市场缺口分析: exactly 4 bullets covering underserved angle, ignored audience niche, positioning opportunity, and content gap
        - Content Opportunity Tags / 内容机会标签: exactly 5 bullets
        - Engagement Benchmarks / 参与度基准: exactly 4 bullets covering platform average level, LinkedIn carousel or strong-performance signal, Instagram Reels signal, and carousel vs single-image or short-video difference
        - If public benchmark signals contain numeric values, keep the numbers and label them in the output language
        - Keep one primary metric theme per bullet
        - Do not combine unrelated benchmarks in the same bullet
        - If two public sources disagree, write them as a range or as `Source A ...; Source B ...`, but keep both tied to the same metric theme
        - Prefer the same metric type or same source type within one benchmark bullet; if a number is unusually high, explicitly mark it as a format-specific benchmark, a supplementary source, or a median/average
        - Prefer conservative and comparable benchmark phrasing; avoid presenting a format-specific high watermark as if it were the default platform average
        - Only use `Unavailable from current source set` when the current source set truly lacks a usable public benchmark signal
        - Recommended Content Mix / 推荐内容组合: exactly 4 bullets and keep them framed as discovery-stage recommendations tied to observed patterns and benchmark signals
        - Keep bullets factual and specific to the brand/site
        - No generic statements that could apply to any SaaS site

  - id: save_delivery_bundle
    type: assign
    parameters:
      target: "delivery_bundle_text"
      value: "$input"

